name: Metrics
on:
  # Atualiza todos os dias à meia-noite
  schedule: [{cron: "0 0 * * *"}]
  # Permite que você rode a automação manualmente clicando em um botão
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: Jupyter Notebook, dart, html, css, js, typescript, C
          plugin_languages_details: percentage
          config_timezone: America/Sao_Paulo
